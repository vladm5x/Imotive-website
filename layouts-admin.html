<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Manager — iMotive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --adm-accent: #4F7EFF;
      --adm-accent-hover: #3B6AE8;
      --adm-accent-soft: #1C2240;
      --adm-accent-muted: #263050;
      --adm-accent-text: #A0B8FF;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #0F1117;
      color: #F1F3F5;
      height: 100dvh;
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 320px minmax(0, 1fr);
      transition: grid-template-columns 0.22s ease;
    }
    body.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    /* Top bar */
    .topbar {
      grid-column: 1 / -1;
      background: #1A1D27;
      border-bottom: 1px solid #2A2D3A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 14px;
    }
    .topbar-brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--adm-accent);
      transition: background 0.3s ease;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-link {
      font-size: 13px;
      color: #8B8FA8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-link:hover { color: #F1F3F5; }

    /* Sidebar */
    .sidebar {
      background: #1A1D27;
      border-right: 1px solid #2A2D3A;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 320px;
      transition: transform 0.22s ease, opacity 0.16s ease;
    }
    body.sidebar-collapsed .sidebar {
      transform: translateX(-320px);
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-toggle {
      position: fixed;
      top: 66px;
      left: 306px;
      z-index: 20;
      width: 28px;
      height: 44px;
      border: 1px solid #2A2D3A;
      border-left: 0;
      border-radius: 0 999px 999px 0;
      background: #1A1D27;
      color: #A0A3B8;
      cursor: pointer;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 8px 0 24px rgba(0, 0, 0, 0.18);
      transition: left 0.22s ease, color 0.15s ease, background 0.15s ease;
    }
    .sidebar-toggle:hover {
      background: #222636;
      color: #F1F3F5;
    }
    body.sidebar-collapsed .sidebar-toggle {
      left: 0;
    }
    .sidebar-heading {
      font-size: 11px;
      font-weight: 600;
      color: #5A5D72;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 4px 8px 8px;
    }

    /* Layout card */
    .layout-card {
      border-radius: 10px;
      border: 1px solid #2A2D3A;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .layout-card:hover { border-color: #4A4D62; background: #1E2130; }
    .layout-card.selected { border-color: var(--adm-accent); background: var(--adm-accent-soft); }
    .layout-card.active-layout { border-color: #22C55E; }
    .layout-card.active-layout.selected { border-color: #22C55E; background: #152820; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #E8EAF0;
    }
    .badge-active {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: #14532D;
      color: #4ADE80;
      border: 1px solid #166534;
      white-space: nowrap;
    }
    .card-desc {
      font-size: 12px;
      color: #6B6E85;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .card-meta {
      font-size: 11px;
      color: #5A5D72;
      margin-bottom: 10px;
    }
    .color-swatches {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .color-swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card-actions {
      display: flex;
      gap: 6px;
    }
    .btn-preview {
      flex: 1;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #2A2D3A;
      background: transparent;
      color: #A0A3B8;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn-preview:hover { border-color: #4A4D62; color: #E8EAF0; }
    .btn-activate {
      flex: 1;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid transparent;
      background: var(--adm-accent);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-activate:hover { background: var(--adm-accent-hover); }
    .btn-activate.is-active {
      background: #14532D;
      color: #4ADE80;
      border-color: #166534;
      cursor: default;
    }

    /* Preview pane */
    .preview-pane {
      position: relative;
      overflow: hidden;
      background: #0A0B10;
    }
    .preview-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .preview-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #3A3D52;
    }
    .preview-empty-icon { font-size: 40px; }
    .preview-empty-text { font-size: 14px; }

    /* Active indicator in preview -->  */
    .preview-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(6px);
      border: 1px solid #2A2D3A;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      color: #A0A3B8;
      display: none;
    }

    /* Tabs */
    .topbar-tabs {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .topbar-tab {
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #6B6E85;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .topbar-tab:hover { color: #E8EAF0; }
    .topbar-tab.active {
      background: #1E2130;
      border-color: #2A2D3A;
      color: #F1F3F5;
    }

    /* Review panel */
    .review-panel {
      grid-column: 1 / -1;
      display: none;
      overflow-y: auto;
      padding: 24px;
      background: #0F1117;
    }
    body.view-review .review-panel { display: block; }
    body.view-review .sidebar,
    body.view-review .sidebar-toggle,
    body.view-review .preview-pane { display: none; }

    .review-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .review-title { font-size: 16px; font-weight: 600; color: #E8EAF0; margin-bottom: 4px; }
    .review-count { font-size: 13px; color: #6B6E85; }
    .review-table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2A2D3A;
    }
    .review-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .review-table th {
      background: #1A1D27;
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #5A5D72;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border-bottom: 1px solid #2A2D3A;
      white-space: nowrap;
    }
    .review-table td {
      padding: 11px 14px;
      border-bottom: 1px solid #1E2130;
      vertical-align: top;
      color: #C8CAD8;
    }
    .review-table tr:last-child td { border-bottom: none; }
    .review-table tr:hover td { background: #141622; }
    .review-url {
      color: var(--adm-accent);
      text-decoration: none;
      word-break: break-all;
      font-size: 12px;
    }
    .review-url:hover { text-decoration: underline; }
    .review-title-cell { font-weight: 500; color: #E8EAF0; max-width: 280px; }
    .review-score { font-weight: 600; white-space: nowrap; }
    .score-low { color: #F87171; }
    .score-mid { color: #FACC15; }
    .score-high { color: #4ADE80; }
    .review-flags { display: flex; flex-wrap: wrap; gap: 4px; max-width: 240px; }
    .flag-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #2A1515;
      color: #F87171;
      border: 1px solid #3D1515;
      white-space: nowrap;
    }
    .review-actions { display: flex; gap: 6px; white-space: nowrap; }
    .btn-approve {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      border: 1px solid #166534;
      background: #14532D;
      color: #4ADE80;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-approve:hover { background: #1A6B38; }
    .btn-approve:disabled { opacity: 0.4; cursor: default; }
    .btn-reject {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      border: 1px solid #3D1515;
      background: #2A1515;
      color: #F87171;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-reject:hover { background: #3B1A1A; }
    .btn-reject:disabled { opacity: 0.4; cursor: default; }
    .review-loading, .review-empty {
      padding: 60px 24px;
      text-align: center;
      color: #3A3D52;
      font-size: 14px;
    }
    .review-error {
      padding: 16px 20px;
      background: #2A1515;
      border: 1px solid #3D1515;
      border-radius: 8px;
      color: #F87171;
      font-size: 13px;
    }
    .btn-refresh {
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #2A2D3A;
      background: transparent;
      color: #A0A3B8;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-refresh:hover { border-color: #4A4D62; color: #E8EAF0; }

    /* Filter bar */
    .review-filter-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #2A2D3A;
      background: transparent;
      color: #6B6E85;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-tab:hover { color: #E8EAF0; border-color: #4A4D62; }
    .filter-tab.active { background: #1E2130; border-color: var(--adm-accent); color: #F1F3F5; }
    .filter-count {
      font-size: 11px;
      background: #2A2D3A;
      color: #8B8FA8;
      border-radius: 999px;
      padding: 1px 7px;
      min-width: 20px;
      text-align: center;
    }
    .filter-tab.active .filter-count { background: var(--adm-accent-muted); color: var(--adm-accent-text); }

    /* Row status indicator */
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .status-dot.needs_review { background: #FACC15; }
    .status-dot.approved { background: #4ADE80; }
    .status-dot.rejected { background: #F87171; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-dot"></div>
      iMotive — Layout Manager
    </div>
    <div class="topbar-tabs">
      <button class="topbar-tab active" id="tabLayouts" type="button">Layouts</button>
      <button class="topbar-tab" id="tabReview" type="button">Review Queue</button>
    </div>
    <div class="topbar-actions">
      <a href="index.html" class="topbar-link" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View live site
      </a>
    </div>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-heading">Layouts</div>
    <!-- Cards injected by JS -->
  </aside>
  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Hide layout sidebar">&lt;</button>

  <div class="preview-pane" id="previewPane">
    <div class="preview-empty" id="previewEmpty">
      <div class="preview-empty-icon">&#128065;</div>
      <div class="preview-empty-text">Select a layout to preview</div>
    </div>
    <iframe id="previewFrame" src="" style="display:none;"></iframe>
    <div class="preview-tag" id="previewTag"></div>
  </div>

  <div class="review-panel" id="reviewPanel">
    <div class="review-header">
      <div>
        <div class="review-title">Scholarship Labeler</div>
        <div class="review-count" id="reviewCount">&nbsp;</div>
      </div>
      <button class="btn-refresh" id="refreshReview" type="button">&#8635; Refresh</button>
    </div>
    <div class="review-filter-bar" id="reviewFilterBar">
      <button class="filter-tab active" data-filter="needs_review">Needs Review <span class="filter-count" id="cnt-needs_review"></span></button>
      <button class="filter-tab" data-filter="approved">Usable <span class="filter-count" id="cnt-approved"></span></button>
      <button class="filter-tab" data-filter="rejected">Not Usable <span class="filter-count" id="cnt-rejected"></span></button>
      <button class="filter-tab" data-filter="all">All <span class="filter-count" id="cnt-all"></span></button>
    </div>
    <div id="reviewContent"><div class="review-loading">Loading…</div></div>
  </div>

  <script type="module">
    import { layoutRegistry } from './src/homepage-layouts/layoutRegistry.js';
    import { getSupabase } from './src/lib/supabaseClient.js';

    const STORAGE_KEY = 'imotive-active-layout';
    const SIDEBAR_STORAGE_KEY = 'imotive-layout-sidebar-collapsed';
    let currentPreviewId = null;

    const ADMIN_THEMES = {
      'original':        { accent: '#3B82F6', hover: '#2563EB', soft: '#1A2840', muted: '#1E3060', text: '#93C5FD' },
      'saas-landing':    { accent: '#4A80E8', hover: '#2D5FC4', soft: '#1C2240', muted: '#1E2E55', text: '#93B8FF' },
      'genz-landing':    { accent: '#7C3AED', hover: '#5B21B6', soft: '#1E1535', muted: '#2A1A50', text: '#C4B5FD' },
      'imotive-landing': { accent: '#6C3AFF', hover: '#5520E0', soft: '#1A1040', muted: '#281A50', text: '#C0A8FF' },
      'purple-landing':  { accent: '#7B40FF', hover: '#5B20E0', soft: '#180840', muted: '#220A55', text: '#B89BFF' },
    };

    function applyAdminTheme(layoutId) {
      const t = ADMIN_THEMES[layoutId] || ADMIN_THEMES['original'];
      const r = document.documentElement;
      r.style.setProperty('--adm-accent',      t.accent);
      r.style.setProperty('--adm-accent-hover', t.hover);
      r.style.setProperty('--adm-accent-soft',  t.soft);
      r.style.setProperty('--adm-accent-muted', t.muted);
      r.style.setProperty('--adm-accent-text',  t.text);
    }

    function isSidebarCollapsed() {
      return localStorage.getItem(SIDEBAR_STORAGE_KEY) === 'true';
    }

    function setSidebarCollapsed(collapsed) {
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      localStorage.setItem(SIDEBAR_STORAGE_KEY, String(collapsed));

      const toggle = document.getElementById('sidebarToggle');
      toggle.textContent = collapsed ? '>' : '<';
      toggle.setAttribute('aria-label', collapsed ? 'Show layout sidebar' : 'Hide layout sidebar');
      toggle.setAttribute('aria-expanded', String(!collapsed));
    }

    function getActiveId() {
      return localStorage.getItem(STORAGE_KEY) || 'original';
    }

    function setActiveId(id) {
      localStorage.setItem(STORAGE_KEY, id);
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const activeId = getActiveId();

      // Clear existing cards (keep heading)
      const heading = sidebar.querySelector('.sidebar-heading');
      sidebar.innerHTML = '';
      sidebar.appendChild(heading);

      layoutRegistry.forEach(layout => {
        const isActive = layout.id === activeId;
        const isSelected = layout.id === currentPreviewId;

        const card = document.createElement('div');
        card.className = `layout-card${isSelected ? ' selected' : ''}${isActive ? ' active-layout' : ''}`;
        card.dataset.id = layout.id;

        card.innerHTML = `
          <div class="card-header">
            <div class="card-name">${layout.name}</div>
            ${isActive ? '<span class="badge-active">Active</span>' : ''}
          </div>
          <div class="card-desc">${layout.description}</div>
          <div class="card-meta">${layout.font}</div>
          <div class="color-swatches">
            ${layout.colors.map(c => `<div class="color-swatch" style="background:${c};"></div>`).join('')}
          </div>
          <div class="card-actions">
            <button class="btn-preview" data-preview="${layout.id}">Preview</button>
            <button class="btn-activate${isActive ? ' is-active' : ''}" data-activate="${layout.id}">
              ${isActive ? '&#10003; Active' : 'Activate'}
            </button>
          </div>
        `;

        // Clicking the card body previews it
        card.addEventListener('click', (e) => {
          if (e.target.closest('button')) return;
          previewLayout(layout.id);
        });

        sidebar.appendChild(card);
      });

      // Button handlers
      sidebar.querySelectorAll('[data-preview]').forEach(btn => {
        btn.addEventListener('click', () => previewLayout(btn.dataset.preview));
      });

      sidebar.querySelectorAll('[data-activate]').forEach(btn => {
        btn.addEventListener('click', () => activateLayout(btn.dataset.activate));
      });
    }

    function previewLayout(id) {
      const layout = layoutRegistry.find(l => l.id === id);
      if (!layout) return;

      currentPreviewId = id;
      applyAdminTheme(id);

      const frame = document.getElementById('previewFrame');
      const empty = document.getElementById('previewEmpty');
      const tag = document.getElementById('previewTag');

      frame.src = layout.htmlPath;
      frame.style.display = 'block';
      empty.style.display = 'none';

      const isActive = id === getActiveId();
      tag.textContent = isActive ? `Active: ${layout.name}` : `Preview: ${layout.name}`;
      tag.style.display = 'block';

      renderSidebar();
    }

    function activateLayout(id) {
      setActiveId(id);
      const layout = layoutRegistry.find(l => l.id === id);
      const tag = document.getElementById('previewTag');

      if (currentPreviewId !== id) {
        previewLayout(id);
      } else {
        renderSidebar();
        if (layout) {
          tag.textContent = `Active: ${layout.name}`;
          tag.style.display = 'block';
        }
      }
    }

    // Init: render sidebar, auto-preview active layout
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      setSidebarCollapsed(!isSidebarCollapsed());
    });
    setSidebarCollapsed(isSidebarCollapsed());
    renderSidebar();
    previewLayout(getActiveId());

    // ── Scholarship Labeler ───────────────────────────────────────────────────
    const supabase = getSupabase();
    if (!supabase) {
      document.getElementById('reviewContent').innerHTML =
        '<div class="review-error">Supabase not configured. Check src/lib/supabaseClient.js.</div>';
    }

    let currentView = 'layouts';
    let activeFilter = 'needs_review';
    let counts = { needs_review: 0, approved: 0, rejected: 0, all: 0 };

    function setView(view) {
      currentView = view;
      document.body.classList.toggle('view-review', view === 'review');
      document.getElementById('tabLayouts').classList.toggle('active', view === 'layouts');
      document.getElementById('tabReview').classList.toggle('active', view === 'review');
      if (view === 'review') {
        fetchCounts();
        fetchLabeler(activeFilter);
      }
    }

    document.getElementById('tabLayouts').addEventListener('click', () => setView('layouts'));
    document.getElementById('tabReview').addEventListener('click', () => setView('review'));
    document.getElementById('refreshReview').addEventListener('click', () => {
      fetchCounts();
      fetchLabeler(activeFilter);
    });

    document.getElementById('reviewFilterBar').addEventListener('click', (e) => {
      const tab = e.target.closest('[data-filter]');
      if (!tab) return;
      activeFilter = tab.dataset.filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === activeFilter));
      fetchLabeler(activeFilter);
    });

    async function fetchCounts() {
      const [pending, approved, rejected, total] = await Promise.all([
        supabase.from('scholarships_raw').select('id', { count: 'exact', head: true }).in('review_status', ['pending_review', 'needs_review']),
        supabase.from('scholarships_raw').select('id', { count: 'exact', head: true }).eq('review_status', 'approved'),
        supabase.from('scholarships_raw').select('id', { count: 'exact', head: true }).eq('review_status', 'rejected'),
        supabase.from('scholarships_raw').select('id', { count: 'exact', head: true }),
      ]);
      counts = {
        needs_review: pending.count || 0,
        approved: approved.count || 0,
        rejected: rejected.count || 0,
        all: total.count || 0,
      };
      ['needs_review', 'approved', 'rejected', 'all'].forEach(k => {
        const el = document.getElementById(`cnt-${k}`);
        if (el) el.textContent = counts[k];
      });
    }

    function scoreClass(score) {
      if (score == null) return '';
      if (score < 40) return 'score-low';
      if (score < 70) return 'score-mid';
      return 'score-high';
    }

    function renderFlags(flags) {
      if (!flags || !flags.length) return '<span style="color:#3A3D52;font-size:12px;">—</span>';
      return `<div class="review-flags">${flags.map(f => `<span class="flag-badge">${f}</span>`).join('')}</div>`;
    }

    function statusLabel(s) {
      if (s === 'approved') return 'Usable';
      if (s === 'rejected') return 'Not Usable';
      return 'Unlabeled';
    }

    function renderTable(rows, filter) {
      if (!rows.length) {
        const msg = filter === 'needs_review' ? 'All caught up — nothing left to label ✓'
          : filter === 'approved' ? 'No usable scholarships labeled yet'
          : filter === 'rejected' ? 'No scholarships marked as not usable yet'
          : 'No scholarships in database';
        return `<div class="review-empty">${msg}</div>`;
      }

      const showStatus = filter === 'all';
      const rowsHtml = rows.map(r => {
        const score = r.quality_score != null ? r.quality_score : '—';
        const flags = Array.isArray(r.quality_flags) ? r.quality_flags
          : (r.quality_flags ? [r.quality_flags] : []);
        const isUsable = r.review_status === 'approved';
        const isNotUsable = r.review_status === 'rejected';

        return `
          <tr id="row-${r.id}" data-status="${r.review_status}">
            <td>
              ${showStatus ? `<span class="status-dot ${r.review_status}" title="${statusLabel(r.review_status)}"></span>` : ''}
              <div class="review-title-cell" style="display:inline;">${r.title || '<em style="color:#5A5D72">untitled</em>'}</div>
            </td>
            <td><a href="${r.url}" target="_blank" rel="noopener" class="review-url">${r.url}</a></td>
            <td><span class="review-score ${scoreClass(r.quality_score)}">${score}</span></td>
            <td>${renderFlags(flags)}</td>
            <td>
              <div class="review-actions">
                <button class="btn-approve${isUsable ? ' is-current' : ''}" data-id="${r.id}" data-action="approve"
                  style="${isUsable ? 'opacity:0.5;cursor:default;' : ''}">
                  ✓ Usable
                </button>
                <button class="btn-reject${isNotUsable ? ' is-current' : ''}" data-id="${r.id}" data-action="reject"
                  style="${isNotUsable ? 'opacity:0.5;cursor:default;' : ''}">
                  ✗ Not Usable
                </button>
              </div>
            </td>
          </tr>`;
      }).join('');

      return `
        <div class="review-table-wrap">
          <table class="review-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>URL</th>
                <th>Score</th>
                <th>Flags</th>
                <th>Label</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;
    }

    async function fetchLabeler(filter) {
      const content = document.getElementById('reviewContent');
      const countEl = document.getElementById('reviewCount');
      content.innerHTML = '<div class="review-loading">Loading…</div>';
      countEl.textContent = '';

      let query = supabase
        .from('scholarships_raw')
        .select('id, title, url, quality_score, quality_flags, review_status')
        .order('quality_score', { ascending: true })
        .limit(300);

      if (filter === 'needs_review') {
        query = query.in('review_status', ['pending_review', 'needs_review']);
      } else if (filter !== 'all') {
        query = query.eq('review_status', filter);
      }

      const { data, error } = await query;

      if (error) {
        content.innerHTML = `<div class="review-error">Error: ${error.message}</div>`;
        return;
      }

      const filterLabel = filter === 'needs_review' ? 'unlabeled' : filter === 'approved' ? 'usable' : filter === 'rejected' ? 'not usable' : 'total';
      countEl.textContent = `${data.length} ${filterLabel}`;
      content.innerHTML = renderTable(data, filter);

      content.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (btn.style.cursor === 'default') return;
          const id = btn.dataset.id;
          const action = btn.dataset.action;
          const newStatus = action === 'approve' ? 'approved' : 'rejected';
          const row = document.getElementById(`row-${id}`);

          btn.closest('.review-actions').querySelectorAll('button').forEach(b => {
            b.disabled = true;
            b.style.opacity = '0.4';
          });

          const { error: updateErr } = await supabase
            .from('scholarships_raw')
            .update({ review_status: newStatus })
            .eq('id', id);

          if (updateErr) {
            btn.closest('.review-actions').querySelectorAll('button').forEach(b => {
              b.disabled = false;
              b.style.opacity = '';
            });
            alert(`Update failed: ${updateErr.message}`);
            return;
          }

          // In "All" view keep row but update visual; in filtered views remove row
          if (filter === 'all') {
            row.dataset.status = newStatus;
            row.querySelectorAll('.status-dot').forEach(d => {
              d.className = `status-dot ${newStatus}`;
              d.title = statusLabel(newStatus);
            });
            btn.closest('.review-actions').querySelectorAll('button').forEach(b => {
              b.disabled = false;
              b.style.opacity = b.dataset.action === action ? '0.5' : '';
              b.style.cursor = b.dataset.action === action ? 'default' : '';
            });
          } else {
            row.style.transition = 'opacity 0.25s';
            row.style.opacity = '0';
            setTimeout(() => row.remove(), 280);
          }

          // Update counts
          const prevStatus = row.dataset.status || 'needs_review';
          if (prevStatus !== newStatus) {
            counts[prevStatus] = Math.max(0, (counts[prevStatus] || 0) - 1);
            counts[newStatus] = (counts[newStatus] || 0) + 1;
            ['needs_review', 'approved', 'rejected', 'all'].forEach(k => {
              const el = document.getElementById(`cnt-${k}`);
              if (el) el.textContent = counts[k];
            });
          }
        });
      });
    }
  </script>

</body>
</html>
