<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Manager — iMotive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", sans-serif;
      background: #0F1117;
      color: #F1F3F5;
      height: 100dvh;
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 320px minmax(0, 1fr);
      transition: grid-template-columns 0.22s ease;
    }
    body.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    /* Top bar */
    .topbar {
      grid-column: 1 / -1;
      background: #1A1D27;
      border-bottom: 1px solid #2A2D3A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 14px;
    }
    .topbar-brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4F7EFF;
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-link {
      font-size: 13px;
      color: #8B8FA8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-link:hover { color: #F1F3F5; }

    /* Sidebar */
    .sidebar {
      background: #1A1D27;
      border-right: 1px solid #2A2D3A;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 320px;
      transition: transform 0.22s ease, opacity 0.16s ease;
    }
    body.sidebar-collapsed .sidebar {
      transform: translateX(-320px);
      opacity: 0;
      pointer-events: none;
    }
    .sidebar-toggle {
      position: fixed;
      top: 66px;
      left: 306px;
      z-index: 20;
      width: 28px;
      height: 44px;
      border: 1px solid #2A2D3A;
      border-left: 0;
      border-radius: 0 999px 999px 0;
      background: #1A1D27;
      color: #A0A3B8;
      cursor: pointer;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      box-shadow: 8px 0 24px rgba(0, 0, 0, 0.18);
      transition: left 0.22s ease, color 0.15s ease, background 0.15s ease;
    }
    .sidebar-toggle:hover {
      background: #222636;
      color: #F1F3F5;
    }
    body.sidebar-collapsed .sidebar-toggle {
      left: 0;
    }
    .sidebar-heading {
      font-size: 11px;
      font-weight: 600;
      color: #5A5D72;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 4px 8px 8px;
    }

    /* Layout card */
    .layout-card {
      border-radius: 10px;
      border: 1px solid #2A2D3A;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .layout-card:hover { border-color: #4A4D62; background: #1E2130; }
    .layout-card.selected { border-color: #4F7EFF; background: #1C2240; }
    .layout-card.active-layout { border-color: #22C55E; }
    .layout-card.active-layout.selected { border-color: #22C55E; background: #152820; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #E8EAF0;
    }
    .badge-active {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: #14532D;
      color: #4ADE80;
      border: 1px solid #166534;
      white-space: nowrap;
    }
    .card-desc {
      font-size: 12px;
      color: #6B6E85;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .card-meta {
      font-size: 11px;
      color: #5A5D72;
      margin-bottom: 10px;
    }
    .color-swatches {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }
    .color-swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card-actions {
      display: flex;
      gap: 6px;
    }
    .btn-preview {
      flex: 1;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #2A2D3A;
      background: transparent;
      color: #A0A3B8;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn-preview:hover { border-color: #4A4D62; color: #E8EAF0; }
    .btn-activate {
      flex: 1;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid transparent;
      background: #4F7EFF;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-activate:hover { background: #3B6AE8; }
    .btn-activate.is-active {
      background: #14532D;
      color: #4ADE80;
      border-color: #166534;
      cursor: default;
    }

    /* Preview pane */
    .preview-pane {
      position: relative;
      overflow: hidden;
      background: #0A0B10;
    }
    .preview-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .preview-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #3A3D52;
    }
    .preview-empty-icon { font-size: 40px; }
    .preview-empty-text { font-size: 14px; }

    /* Active indicator in preview -->  */
    .preview-tag {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(6px);
      border: 1px solid #2A2D3A;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      color: #A0A3B8;
      display: none;
    }

    /* Tabs */
    .topbar-tabs {
      display: flex;
      gap: 3px;
      align-items: center;
    }
    .topbar-tab {
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #6B6E85;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .topbar-tab:hover { color: #E8EAF0; }
    .topbar-tab.active {
      background: #1E2130;
      border-color: #2A2D3A;
      color: #F1F3F5;
    }

    /* Review panel */
    .review-panel {
      grid-column: 1 / -1;
      display: none;
      overflow-y: auto;
      padding: 24px;
      background: #0F1117;
    }
    body.view-review .review-panel { display: block; }
    body.view-review .sidebar,
    body.view-review .sidebar-toggle,
    body.view-review .preview-pane { display: none; }

    .review-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .review-title { font-size: 16px; font-weight: 600; color: #E8EAF0; margin-bottom: 4px; }
    .review-count { font-size: 13px; color: #6B6E85; }
    .review-table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2A2D3A;
    }
    .review-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .review-table th {
      background: #1A1D27;
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #5A5D72;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border-bottom: 1px solid #2A2D3A;
      white-space: nowrap;
    }
    .review-table td {
      padding: 11px 14px;
      border-bottom: 1px solid #1E2130;
      vertical-align: top;
      color: #C8CAD8;
    }
    .review-table tr:last-child td { border-bottom: none; }
    .review-table tr:hover td { background: #141622; }
    .review-url {
      color: #4F7EFF;
      text-decoration: none;
      word-break: break-all;
      font-size: 12px;
    }
    .review-url:hover { text-decoration: underline; }
    .review-title-cell { font-weight: 500; color: #E8EAF0; max-width: 280px; }
    .review-score { font-weight: 600; white-space: nowrap; }
    .score-low { color: #F87171; }
    .score-mid { color: #FACC15; }
    .score-high { color: #4ADE80; }
    .review-flags { display: flex; flex-wrap: wrap; gap: 4px; max-width: 240px; }
    .flag-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #2A1515;
      color: #F87171;
      border: 1px solid #3D1515;
      white-space: nowrap;
    }
    .review-actions { display: flex; gap: 6px; white-space: nowrap; }
    .btn-approve {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      border: 1px solid #166534;
      background: #14532D;
      color: #4ADE80;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-approve:hover { background: #1A6B38; }
    .btn-approve:disabled { opacity: 0.4; cursor: default; }
    .btn-reject {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      border: 1px solid #3D1515;
      background: #2A1515;
      color: #F87171;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-reject:hover { background: #3B1A1A; }
    .btn-reject:disabled { opacity: 0.4; cursor: default; }
    .review-loading, .review-empty {
      padding: 60px 24px;
      text-align: center;
      color: #3A3D52;
      font-size: 14px;
    }
    .review-error {
      padding: 16px 20px;
      background: #2A1515;
      border: 1px solid #3D1515;
      border-radius: 8px;
      color: #F87171;
      font-size: 13px;
    }
    .btn-refresh {
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #2A2D3A;
      background: transparent;
      color: #A0A3B8;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-refresh:hover { border-color: #4A4D62; color: #E8EAF0; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-dot"></div>
      iMotive — Layout Manager
    </div>
    <div class="topbar-tabs">
      <button class="topbar-tab active" id="tabLayouts" type="button">Layouts</button>
      <button class="topbar-tab" id="tabReview" type="button">Review Queue</button>
    </div>
    <div class="topbar-actions">
      <a href="index.html" class="topbar-link" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View live site
      </a>
    </div>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-heading">Layouts</div>
    <!-- Cards injected by JS -->
  </aside>
  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Hide layout sidebar">&lt;</button>

  <div class="preview-pane" id="previewPane">
    <div class="preview-empty" id="previewEmpty">
      <div class="preview-empty-icon">&#128065;</div>
      <div class="preview-empty-text">Select a layout to preview</div>
    </div>
    <iframe id="previewFrame" src="" style="display:none;"></iframe>
    <div class="preview-tag" id="previewTag"></div>
  </div>

  <div class="review-panel" id="reviewPanel">
    <div class="review-header">
      <div>
        <div class="review-title">Review Queue</div>
        <div class="review-count" id="reviewCount">&nbsp;</div>
      </div>
      <button class="btn-refresh" id="refreshReview" type="button">&#8635; Refresh</button>
    </div>
    <div id="reviewContent"><div class="review-loading">Loading…</div></div>
  </div>

  <script type="module">
    import { layoutRegistry } from './src/homepage-layouts/layoutRegistry.js';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

    const STORAGE_KEY = 'imotive-active-layout';
    const SIDEBAR_STORAGE_KEY = 'imotive-layout-sidebar-collapsed';
    let currentPreviewId = null;

    function isSidebarCollapsed() {
      return localStorage.getItem(SIDEBAR_STORAGE_KEY) === 'true';
    }

    function setSidebarCollapsed(collapsed) {
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      localStorage.setItem(SIDEBAR_STORAGE_KEY, String(collapsed));

      const toggle = document.getElementById('sidebarToggle');
      toggle.textContent = collapsed ? '>' : '<';
      toggle.setAttribute('aria-label', collapsed ? 'Show layout sidebar' : 'Hide layout sidebar');
      toggle.setAttribute('aria-expanded', String(!collapsed));
    }

    function getActiveId() {
      return localStorage.getItem(STORAGE_KEY) || 'original';
    }

    function setActiveId(id) {
      localStorage.setItem(STORAGE_KEY, id);
    }

    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const activeId = getActiveId();

      // Clear existing cards (keep heading)
      const heading = sidebar.querySelector('.sidebar-heading');
      sidebar.innerHTML = '';
      sidebar.appendChild(heading);

      layoutRegistry.forEach(layout => {
        const isActive = layout.id === activeId;
        const isSelected = layout.id === currentPreviewId;

        const card = document.createElement('div');
        card.className = `layout-card${isSelected ? ' selected' : ''}${isActive ? ' active-layout' : ''}`;
        card.dataset.id = layout.id;

        card.innerHTML = `
          <div class="card-header">
            <div class="card-name">${layout.name}</div>
            ${isActive ? '<span class="badge-active">Active</span>' : ''}
          </div>
          <div class="card-desc">${layout.description}</div>
          <div class="card-meta">${layout.font}</div>
          <div class="color-swatches">
            ${layout.colors.map(c => `<div class="color-swatch" style="background:${c};"></div>`).join('')}
          </div>
          <div class="card-actions">
            <button class="btn-preview" data-preview="${layout.id}">Preview</button>
            <button class="btn-activate${isActive ? ' is-active' : ''}" data-activate="${layout.id}">
              ${isActive ? '&#10003; Active' : 'Activate'}
            </button>
          </div>
        `;

        // Clicking the card body previews it
        card.addEventListener('click', (e) => {
          if (e.target.closest('button')) return;
          previewLayout(layout.id);
        });

        sidebar.appendChild(card);
      });

      // Button handlers
      sidebar.querySelectorAll('[data-preview]').forEach(btn => {
        btn.addEventListener('click', () => previewLayout(btn.dataset.preview));
      });

      sidebar.querySelectorAll('[data-activate]').forEach(btn => {
        btn.addEventListener('click', () => activateLayout(btn.dataset.activate));
      });
    }

    function previewLayout(id) {
      const layout = layoutRegistry.find(l => l.id === id);
      if (!layout) return;

      currentPreviewId = id;

      const frame = document.getElementById('previewFrame');
      const empty = document.getElementById('previewEmpty');
      const tag = document.getElementById('previewTag');

      frame.src = layout.htmlPath;
      frame.style.display = 'block';
      empty.style.display = 'none';

      const isActive = id === getActiveId();
      tag.textContent = isActive ? `Active: ${layout.name}` : `Preview: ${layout.name}`;
      tag.style.display = 'block';

      renderSidebar();
    }

    function activateLayout(id) {
      setActiveId(id);
      const layout = layoutRegistry.find(l => l.id === id);
      const tag = document.getElementById('previewTag');

      if (currentPreviewId !== id) {
        previewLayout(id);
      } else {
        renderSidebar();
        if (layout) {
          tag.textContent = `Active: ${layout.name}`;
          tag.style.display = 'block';
        }
      }
    }

    // Init: render sidebar, auto-preview active layout
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      setSidebarCollapsed(!isSidebarCollapsed());
    });
    setSidebarCollapsed(isSidebarCollapsed());
    renderSidebar();
    previewLayout(getActiveId());

    // ── Review Queue ──────────────────────────────────────────────────────────
    const SUPA_URL = 'https://yltxrmvxqnptffsmrpyt.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlsdHhybXZ4cW5wdGZmc21ycHl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTIxMzMsImV4cCI6MjA5Mjg4ODEzM30.Dvb9Y4nuoDMxEyWm-4p1nbpjhyuAJzZ0cVSMoJXyZcM';
    const supabase = createClient(SUPA_URL, SUPA_KEY);

    let currentView = 'layouts';

    function setView(view) {
      currentView = view;
      document.body.classList.toggle('view-review', view === 'review');
      document.getElementById('tabLayouts').classList.toggle('active', view === 'layouts');
      document.getElementById('tabReview').classList.toggle('active', view === 'review');
      if (view === 'review') fetchReviewQueue();
    }

    document.getElementById('tabLayouts').addEventListener('click', () => setView('layouts'));
    document.getElementById('tabReview').addEventListener('click', () => setView('review'));
    document.getElementById('refreshReview').addEventListener('click', fetchReviewQueue);

    function scoreClass(score) {
      if (score == null) return '';
      if (score < 40) return 'score-low';
      if (score < 70) return 'score-mid';
      return 'score-high';
    }

    function renderFlags(flags) {
      if (!flags || !flags.length) return '<span style="color:#3A3D52;font-size:12px;">—</span>';
      return `<div class="review-flags">${flags.map(f => `<span class="flag-badge">${f}</span>`).join('')}</div>`;
    }

    function renderTable(rows) {
      if (!rows.length) {
        return '<div class="review-empty">No items need review ✓</div>';
      }
      const rowsHtml = rows.map(r => {
        const score = r.quality_score != null ? r.quality_score : '—';
        const flags = Array.isArray(r.quality_flags) ? r.quality_flags
          : (r.quality_flags ? [r.quality_flags] : []);
        return `
          <tr id="row-${r.id}">
            <td><div class="review-title-cell">${r.title || '<em style="color:#5A5D72">untitled</em>'}</div></td>
            <td><a href="${r.url}" target="_blank" rel="noopener" class="review-url">${r.url}</a></td>
            <td><span class="review-score ${scoreClass(r.quality_score)}">${score}</span></td>
            <td>${renderFlags(flags)}</td>
            <td>
              <div class="review-actions">
                <button class="btn-approve" data-id="${r.id}" data-action="approve">Approve</button>
                <button class="btn-reject" data-id="${r.id}" data-action="reject">Reject</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      return `
        <div class="review-table-wrap">
          <table class="review-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>URL</th>
                <th>Score</th>
                <th>Flags</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;
    }

    async function fetchReviewQueue() {
      const content = document.getElementById('reviewContent');
      const countEl = document.getElementById('reviewCount');
      content.innerHTML = '<div class="review-loading">Loading…</div>';
      countEl.textContent = '';

      const { data, error } = await supabase
        .from('scholarships_raw')
        .select('id, title, url, quality_score, quality_flags, blocked, requires_login, unreachable')
        .eq('review_status', 'needs_review')
        .order('quality_score', { ascending: true })
        .limit(200);

      if (error) {
        content.innerHTML = `<div class="review-error">Error: ${error.message}</div>`;
        return;
      }

      countEl.textContent = `${data.length} item${data.length !== 1 ? 's' : ''} pending`;
      content.innerHTML = renderTable(data);

      // Action handlers
      content.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const action = btn.dataset.action;
          const newStatus = action === 'approve' ? 'approved' : 'rejected';
          const row = document.getElementById(`row-${id}`);

          btn.closest('.review-actions').querySelectorAll('button').forEach(b => b.disabled = true);

          const { error: updateErr } = await supabase
            .from('scholarships_raw')
            .update({ review_status: newStatus })
            .eq('id', id);

          if (updateErr) {
            btn.closest('.review-actions').querySelectorAll('button').forEach(b => b.disabled = false);
            alert(`Update failed: ${updateErr.message}`);
            return;
          }

          row.style.transition = 'opacity 0.3s';
          row.style.opacity = '0';
          setTimeout(() => row.remove(), 300);

          const remaining = content.querySelectorAll('tbody tr:not([style*="opacity: 0"])').length - 1;
          countEl.textContent = `${Math.max(0, remaining)} item${remaining !== 1 ? 's' : ''} pending`;
        });
      });
    }
  </script>

</body>
</html>
