<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found | iMotive</title>
  <script>
    const target = new URL("signup.html", window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "/"));
    const path = window.location.pathname.toLowerCase();
    if (path.includes("/signup") || path.includes("/scholarships") || path.includes("/search") || path.includes("/login")) {
      window.location.replace(target.href);
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #ffffff;
      --off: #f6f6f8;
      --line: #e7e7ec;
      --ink: #111111;
      --ink-2: #2a2a2e;
      --muted: #6b6b73;
      --muted-2: #9a9aa3;
      --purple-900: #2b007a;
      --purple-700: #4b00d8;
      --purple-500: #6a00ff;
      --purple-300: #b88cff;
      --purple-100: #efe6ff;
      --pink: #ff4fd8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    body { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; color: var(--ink); background: var(--white); -webkit-font-smoothing: antialiased; line-height: 1.5; display: flex; flex-direction: column; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
    p { margin: 0; }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

    /* NAV */
    .nav { background: rgba(255,255,255,.88); backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid rgba(17,17,17,.06); }
    .nav-inner { display: flex; align-items: center; gap: 40px; height: 72px; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: 'Space Grotesk'; font-weight: 600; font-size: 19px; letter-spacing: -0.02em; }
    .logo-mark { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, var(--purple-500) 0%, var(--purple-700) 60%, var(--purple-900) 100%); position: relative; flex-shrink: 0; }
    .logo-mark::after { content: ""; position: absolute; inset: 6px; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.55), transparent 55%); border-radius: 4px; }
    .nav-cta { margin-left: auto; display: flex; gap: 12px; }
    .btn { display: inline-flex; align-items: center; height: 40px; padding: 0 18px; border-radius: 999px; font-size: 14.5px; font-weight: 500; }
    .btn-ghost { color: var(--ink); }
    .btn-ghost:hover { background: var(--off); }
    .btn-primary { background: var(--ink); color: var(--white); }
    .btn-primary:hover { background: var(--purple-700); }

    /* MAIN */
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 32px; text-align: center; }
    .not-found-num {
      font-family: 'Space Grotesk'; font-weight: 600;
      font-size: clamp(100px, 20vw, 200px);
      line-height: 1; letter-spacing: -0.05em;
      background: linear-gradient(120deg, var(--purple-700), var(--purple-500) 50%, var(--pink));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 8px; display: block;
    }
    .not-found-h { font-size: clamp(22px, 3vw, 36px); margin-bottom: 14px; }
    .not-found-p { color: var(--muted); font-size: 17px; max-width: 42ch; margin: 0 auto 40px; line-height: 1.6; }
    .link-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-purple { background: var(--purple-700); color: white; box-shadow: 0 8px 24px -8px rgba(75,0,216,.5); border-radius: 14px; height: 52px; padding: 0 26px; font-size: 16px; }
    .btn-purple:hover { background: var(--purple-500); transform: translateY(-1px); }
    .btn-outline { background: white; color: var(--ink); border: 1px solid var(--line); border-radius: 14px; height: 52px; padding: 0 26px; font-size: 16px; }
    .btn-outline:hover { border-color: var(--ink); }

    /* FOOTER */
    footer { padding: 32px; border-top: 1px solid var(--line); display: flex; justify-content: center; }
    .foot-bot { font-size: 12.5px; color: var(--muted); }
  </style>
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark"></span> iMotive</a>

      <a href="signup.html" class="btn btn-ghost">Sign in</a>
      <a href="signup.html" class="btn btn-primary">Sign Up Free</a>
    </div>
  </div>
</header>

<main>
  <div>
    <span class="not-found-num">404</span>
    <h1 class="not-found-h">This page doesn't exist.</h1>
    <p class="not-found-p">You might have followed a broken link, or the page was moved. Either way, let's get you back on track.</p>
    <div class="link-row">
      <a href="index.html" class="btn btn-purple">Go to homepage →</a>
      <a href="homepage-layouts/purple-browse.html" class="btn btn-outline">Browse scholarships</a>
    </div>
  </div>
</main>

<footer>
  <div class="foot-bot">© 2026 iMotive — Profile-driven scholarship matching.</div>
</footer>

</body>
</html>
